openapi: 3.0.3
info:
  title: Data Export API
  termsOfService: https://domain.com/terms
  x-internal: true
  description: |
    Data Export API Documentation

    ## Common Request Headers
    All APIs require the following header parameters:
    | Header | Required | Description |
    |--------|----------|-------------|
    | Authorization | Yes | `Bearer accessToken` |
    | Content-Type | Yes | `application/json` |
  version: v1

servers:
  - url: '{host}/open/api/v1'
    description: Data Export API endpoint
    variables:
      host:
        description: |
          Please enter your Aqara Studio service address. This can be a local LAN address (http) or a remote access address (https).
          For example:
          - http://10.11.50.56
          - https://xxx.edge-xxx.aqara.com/
        default: '<Aqara_Studio_URL>'

# Global Security: All endpoints require Bearer Token
security:
  - BearerAuth: []

tags:
  - name: Space
    description: APIs for space query
  - name: Device
    description: APIs for device query, properties read/write, and command execution
  - name: Gateway
    description: APIs for managing gateway subdevice pairing, binding, and unbinding operations
  - name: Automation
    description: APIs for automation creation, editing, query, deletion, and capability query

paths:

  # ────────────────────────────────────────────────────────────────
  # List Spaces
  # ────────────────────────────────────────────────────────────────
  /spaces:
    get:
      tags: [Space]
      summary: List Spaces
      description: List all child spaces under the specified parent space. Optionally include the parent space itself to flexibly meet diverse hierarchical querying needs.
      operationId: getSpaces
      x-skill-intent: space.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - name: parentSpaceId
          in: query
          description: Parent space ID. If empty, the response will return all top-level spaces (spaces without a parent, i.e., root nodes of the space tree).
          required: false
          schema:
            type: string
        - name: needChildren
          in: query
          description: Whether to query for child spaces under the parent space. If parentSpaceId is not empty and needChildren is false, child spaces will not be returned (the parent space itself may be returned only when needParentSpaceSelf is true).
          required: false
          schema:
            type: boolean
            default: true
        - name: needParentSpaceSelf
          in: query
          description: Whether to include the parent space itself (corresponding to parentSpaceId). This takes effect only if parentSpaceId is not empty.
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Request succeeded
     
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpacesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

    post:
      tags: [Space]
      summary: Create A Space
      description: Create a space. When parentSpaceId is empty, a top-level (root) space will be created; if not empty, a child space will be created under the specified parent space.
      operationId: createSpace
      x-skill-intent: space.create
      x-idempotent: false
      x-retryable: false
      x-side-effects: create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpaceRequest'
            example:
              parentSpaceId: "space-home-001"
              name: "Living Room"
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSpaceResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Update Space Name
  # ────────────────────────────────────────────────────────────────
  /spaces/name:
    post:
      tags: [Space]
      summary: Update A Space Name
      description: Update the name of the specified space.
      operationId: updateSpaceName
      x-skill-intent: space.name.update
      x-idempotent: true
      x-retryable: true
      x-side-effects: update
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSpaceNameRequest'
            example:
              spaceId: "space-livingroom-001"
              name: "New Living Room"
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateSpaceNameResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':  
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # DeviceType Collection Query
  # ────────────────────────────────────────────────────────────────
  /devices/types:
    get:
      tags: [Device]
      summary: List Device Types
      description: Get all existing device types (DeviceType) in your Aqara Studio.
      operationId: getDeviceTypes
      x-skill-intent: device.type.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters: []
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceTypesResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Device List Query
  # ────────────────────────────────────────────────────────────────
  /devices:
    get:
      tags: [Device]
      summary: List Devices
      description: Get a list of devices under the specified space. It supports pagination and filtering conditions.
      operationId: getDevices
      x-skill-intent: device.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - name: spaceIds
          in: query
          description: "Space ID list. Example: spaceIds=xx1,xx2 or spaceIds=xx1&spaceIds=xx2. If empty, all devices will be queried."
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: needChildren
          in: query
          description: Whether to query devices in child spaces. Only effective when spaceIds is not empty.
          required: false
          schema:
            type: boolean
            default: false
        - name: spaceAssociated
          in: query
          description: "Whether to query devices under the specified spaceIds.<ul><li>true: Query only devices under the specified space(s).</li><li>false: Query only devices NOT under the specified space(s) (in this case, the spaceIds and needChildren parameters are ignored).</li><li>Not set:<ul><li>If spaceIds is empty, queries all devices by default.</li><li>If spaceIds is set, queries devices under the specified space(s) by default.</li></ul></li></ul>"
          required: false
          schema:
            type: boolean
            nullable: true
        - name: state
          in: query
          description: "Device online status. <ul><li>true: Query online devices.</li><li>false: Query offline devices.</li><li>Not set: Do not filter by status.</li></ul>"
          required: false
          schema:
            type: boolean
            nullable: true
        - name: deviceTypesList
          in: query
          description: "Device type list. Example: deviceTypesList=light,switch or deviceTypesList=light&deviceTypesList=switch"
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: deviceName
          in: query
          description: Device name fuzzy matching (case-insensitive, blank values are automatically ignored)
          required: false
          schema:
            type: string
        - name: orderBy
          in: query
          description: "Sorting method. <ul><li><code>createTime asc</code>: Sorts results by creation time in ascending order (oldest first).</li><li><code>createTime desc</code>: Sorts results by creation time in descending order (newest first).</li></ul>"
          required: false
          schema:
            type: string
            default: createTime asc
            enum: [createTime asc, createTime desc]
          example: createTime asc
        - name: pageNum
          in: query
          description: Page number
          required: false
          schema:
            type: integer
          example: 1
        - name: pageSize
          in: query
          description: Number of devices per page
          required: false
          schema:
            type: integer
          example: 200
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicesResponse'
              examples:
                devicesPage:
                  value:
                    type: GetDeviceInfoResponse
                    version: v1
                    msgId: "1751609244328"
                    code: 0
                    message: success
                    data:
                      totalCount: 3
                      pageNum: 1
                      pageSize: 200
                      data:
                        - deviceId: "device-001"
                          deviceName: "Living Room Light"
                          deviceTypesList: ["light"]
                          createTime: 1710001234567
                          state: true
                          space:
                            parentSpaceId: "space-home-001"
                            spaceId: "space-room-001"
                            name: "Living Room"
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Query Device Definitions (Device Details)
  # ────────────────────────────────────────────────────────────────
  /devices/definitions:
    get:
      tags: [Device]
      summary: Query Device Model Definition
      description: Get detailed model definition for specified devices, including device types, an endpoint list, property lists, etc.
      operationId: getDeviceDefinitions
      x-skill-intent: device.definition.get
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - name: deviceIds
          in: query
          required: true
          description: "Device ID list. Example: deviceIds=xx1,xx2 or deviceIds=xx1&deviceIds=xx2"
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDefinitionsResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Control Device / Reconnect Device to a New Room / Rename Device
  # ────────────────────────────────────────────────────────────────
  /devices/trait/execute:
    post:
      tags: [Device]
      summary: Control Devices by Traits
      description: |
        Control devices by traits. You can perform the following operations:
        - Update device attributes (such as switch, temperature, etc. For functionCode and traitCode, please refer to the /devices/definitions interface)
        - Reconnect device to a new room (functionCode="EndpointLabel", traitCode="EndpointRoom")
        - Rename device (functionCode="EndpointLabel", traitCode="EndpointName")
      operationId: executeDeviceTrait
      x-skill-intent: device.trait.execute
      x-idempotent: false
      x-retryable: conditional
      x-side-effects: device_state_change
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraitExecuteRequest'
            examples:
              executeOnOff:
                value:
                  data:
                    - deviceId: "123456"
                      endpointId: 1
                      functionCode: Output
                      traitCode: OnOff
                      value: true
      responses:
        '200':
          description: Request succeeded. However, it does not mean all trait values were set successfully.<br />A code value of 0 indicates that at least some operations succeeded; a non-zero code indicates all failed.<br />If data is present, it indicates the set of traits that failed to be set; if not, all traits were set successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraitExecuteResponse'
              examples:
                partialFailed:
                  value:
                    type: ExecuteTraitResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf7"
                    code: 0
                    message: success
                    data:
                      - deviceId: "123456"
                        endpointId: 1
                        functionCode: Output
                        traitCode: OnOff
                        code: 1103
                        message: device offline
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Query trait function values
  # ────────────────────────────────────────────────────────────────
  /devices/trait/read:
    post:
      tags: [Device]
      summary: Query Trait Values
      description: Batch query the current values of specified traits.
      operationId: getTraitValues
      x-skill-intent: device.trait.read
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraitReadRequest'
            examples:
              readTraits:
                value:
                  data:
                    - deviceId: "123456"
                      endpointId: 1
                      functionCode: Output
                      traitCodes: [OnOff]
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraitValueResponse'
              examples:
                traitValueSuccess:
                  value:
                    type: GetTraitValueResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf8"
                    code: 0
                    message: success
                    data:
                      - deviceId: "123456"
                        endpointId: 1
                        functionCode: Output
                        traitCode: OnOff
                        value: true
                        time: 1710001234567
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Control devices by commands
  # ────────────────────────────────────────────────────────────────
  /devices/command/execute:
    post:
      tags: [Device]
      summary: Control Devices by Commands
      description: |
        Use commands to control device.
        The required parameters, such as endpointId, functionCode, commandCode, and fieldCode, should be obtained from the /devices/definitions API before making a control request.
      operationId: executeDeviceCommand
      x-skill-intent: device.command.execute
      x-idempotent: false
      x-retryable: conditional
      x-side-effects: device_state_change
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandExecuteRequest'
            examples:
              executeCommand:
                value:
                  data:
                    - deviceId: "gateway001"
                      endpointId: 1
                      functionCode: NetworkCommissioning
                      commandCode: TriggerZigbeeNetworkInfoUpload
                      args:
                        - fieldCode: InstallCode
                          value: "F9B34846413AB5DE81B60E63E440"
                        - fieldCode: MAC
                          value: "54EF441000EB0CCF"
      responses:
        '200':
          description: Request succeeded. However, it does not mean all commands were executed successfully.<br />A code value of 0 indicates at least some commands succeeded; a non-zero code indicates all commands failed.<br/>If data is present, it represents the collection of commands that failed; if not, all commands succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandExecuteResponse'
              examples:
                commandFailed:
                  value:
                    type: ExecuteCommandResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf9"
                    code: 0
                    message: success
                    data:
                      - deviceId: "gateway001"
                        endpointId: 1
                        functionCode: HubCoordination
                        commandCode: APIBindSubdeviceWithSecurityCode
                        code: 2201
                        message: invalid security code
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Enable Gateway Sub-device Join Mode
  # ────────────────────────────────────────────────────────────────
  /gateways/subdevices/join:
    post:
      tags: [Gateway]
      summary: Enable Sub-device Joining
      description: |
        Call this API to make a specified Zigbee gateway enter subdevice join mode.

        :::tip
        Before starting, please ensure that the Zigbee subdevice is already in pairing mode.
        :::
 
      operationId: joinSubdevice
      x-skill-intent: gateway.subdevice.join
      x-idempotent: false
      x-retryable: conditional
      x-side-effects: device_state_change
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubdeviceJoinRequest'
            examples:
              zigbeeJoin:
                summary: Standard Zigbee device pairing (e.g., triple-click to join)
                value:
                  gatewayId: "gateway001"
                  commandCode: APIEnableSubdeviceJoining
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubdeviceJoinResponse'
              examples:
                success:
                  value:
                    type: SubdeviceJoinResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecf9"
                    code: 0
                    message: success
                fail:
                  value:
                    type: SubdeviceJoinResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecfa"
                    code: 2201
                    message: invalid security code
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Disable Gateway Sub-device Join Mode
  # ────────────────────────────────────────────────────────────────
  /gateways/subdevices/join/stop:
    post:
      tags: [Gateway]
      summary: Disable Sub-device Joining
      description: Call this API to have a specified Zigbee gateway exit sub-device addition mode.
      operationId: stopSubdeviceJoin
      x-skill-intent: gateway.subdevice.join.stop
      x-idempotent: true
      x-retryable: true
      x-side-effects: device_state_change
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubdeviceJoinStopRequest'
            examples:
              stopJoin:
                value:
                  gatewayId: "gateway001"
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
              examples:
                success:
                  value:
                    type: SubdeviceJoinStopResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecfb"
                    code: 0
                    message: success
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Query Sub-device Joining Result
  # ────────────────────────────────────────────────────────────────
  /gateways/subdevices/bindResult:
    post:
      tags: [Gateway]
      summary: Query Sub-device Joining Results
      description: |
        Query the joining results of specified sub-devices. Flexible filtering is supported via `protocols` (protocol types) and `gatewaySubdeviceFilters` (filter conditions for gateways and their sub-devices). Multiple protocols and multiple gateway/sub-device combinations can be queried at the same time.   
      operationId: getDeviceBindResult
      x-skill-intent: device.bind.result
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceBindResultRequest'
            examples:
              queryByGatewayAndSubDevices:
                value:
                  protocols: [zigbee, matter]
                  gatewaySubdeviceFilters:
                    - gatewayId: "gateway-001"
                      subDeviceIds: []
                    - gatewayId: "gateway-001"
                      subDeviceIds: ["subdevice-001", "subdevice-002"]
                    - gatewayId: "gateway-002"
                      subDeviceIds: ["subdevice-101"]
      responses:
        '200':
          description: Request succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceBindResultResponse'
              examples:
                bindResultSuccess:
                  value:
                    type: DeviceBindResultResponse
                    version: v1
                    msgId: "2df2f431-a58d-4fdb-b39c-4f0d29e7ecfb"
                    code: 0
                    message: success
                    data:
                      - deviceId: "subdevice-001"
                        deviceName: "Bedroom Temperature Sensor"
                        protocols: [zigbee]
                        gatewayId: "gateway-001"
                        code: 0
                        message: null
                        bindTime: 1710001235000
                      - deviceId: "subdevice-002"
                        deviceName: null
                        protocols: [matter]
                        gatewayId: "gateway-001"
                        code: 0
                        message: null
                        bindTime: 1710001236000
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  # ────────────────────────────────────────────────────────────────
  # Automation Capability Query
  # ────────────────────────────────────────────────────────────────
  /automations/capabilities:
    get:
      tags: [Automation]
      summary: List Endpoint Capabilities for Automation
      description: Get the list of endpoint capabilities in all devices that can be used to create **Flow** automations. The response includes the value type and unit for each endpoint, as well as the roles they support in **Flow** automations (e.g., can be used as a trigger, condition, or action).
      operationId: getAutomationCapabilities
      x-skill-intent: automation.capabilities
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - in: query
          name: definitionType
          required: false
          schema:
            type: string
            enum: [SCRIPT_JSON]
          description: Automation type. Currently, only SCRIPT_JSON (i.e., **Flow** automation) is supported.
     
      responses:
