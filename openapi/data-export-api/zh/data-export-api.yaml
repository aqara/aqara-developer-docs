        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    get:
      tags: [Automation]
      summary: 查询自动化列表
      description: 查询自动化列表，支持通过自动化类型、排序方式、分页等参数进行筛选和检索。
      operationId: queryAutomationList
      x-skill-intent: automation.list
      x-idempotent: true
      x-retryable: true
      x-side-effects: none
      parameters:
        - in: query
          name: definitionTypes
          required: false
          description: |
            自动化类型列表。    
            支持如下值：
            SCRIPT_JSON：通过 API 创建的 Flow 自动化。  
            SCRIPT_TEXT：通过 Aqara Studio Web 页面创建的 Flow 自动化。  
            WHEN_IF_THEN：Classic 自动化。  
            LEGACY_FLOW：Flow 自动化（旧版）。  
            LEGACY_LINKAGE：Logic 自动化。  
            OTHER：其他自动化类型。    
            示例：definitionTypes=SCRIPT_JSON,LEGACY_FLOW 或 definitionTypes=SCRIPT_JSON&definitionTypes=LEGACY_FLOW。    
            不传或空值时查询全部类型。
          schema:
            type: array
            items:
              type: string
              enum: [SCRIPT_JSON, SCRIPT_TEXT, WHEN_IF_THEN, LEGACY_FLOW, LEGACY_LINKAGE, OTHER]
          style: form
          explode: true
        - in: query
          name: automationName
          required: false
          description: 自动化名称模糊匹配关键字；不传或空值时不做名称过滤。
          schema:
            type: string
          example: 回家亮灯
        - in: query
          name: spaceIds
          required: false
          description: 是否查询指定空间 ID 列表下的自动化。示例：spaceIds=xx1,xx2 或 spaceIds=xx1&spaceIds=xx2。为空时不按指定空间过滤。
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - in: query
          name: needChildren
          required: false
          description: 是否查询 spaceIds 指定空间的子空间内的自动化。仅当 spaceIds 参数有值时此参数才生效。
          schema:
            type: boolean
            default: false
        - in: query
          name: spaceAssociated
          required: false
          description: |
            是否根据自动化与空间的关联关系进行过滤。
            - 不传（默认）：不根据空间关联过滤，返回所有自动化。
            - true：仅返回已关联空间的自动化。
            - false：仅返回未关联空间的自动化；此时 spaceIds 和 needChildren 参数不生效。
          schema:
            type: boolean
            nullable: true
        - in: query
          name: orderBy
          required: false
          description: |
            排序方式。支持如下值：
            - createTime asc：按创建时间升序；
            - createTime desc：按创建时间降序。
          schema:
            type: string
            default: createTime asc
            enum: [createTime asc, createTime desc]
          example: createTime asc
        - in: query
          name: pageNum
          description: 页码
          required: false
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          description: 每页条数
          required: false
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: 请求发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationListResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

